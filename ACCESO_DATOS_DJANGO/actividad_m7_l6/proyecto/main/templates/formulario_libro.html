{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">{% if libro %}Editar: {{ libro.titulo }}{% else %}Nuevo Libro{% endif %}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Título del Libro</label>
                        <input type="text" name="titulo" class="form-control" value="{{ libro.titulo }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Autor</label>
                        <input type="text" name="autor" class="form-control" value="{{ libro.autor }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Año de Publicación</label>
                        <input type="number" name="fecha_publicacion" class="form-control" value="{{ libro.fecha_publicacion }}" required>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">Guardar Cambios</button>
                        <a href="{% url 'listar_libros' %}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
