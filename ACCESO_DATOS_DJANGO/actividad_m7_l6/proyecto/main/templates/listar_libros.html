{% extends 'base.html' %}

{% block content %}
<div class="card shadow">
    <div class="card-header bg-white d-flex justify-content-between align-items-center">
        <h2 class="mb-0">Mis Libros</h2>
    </div>
    <div class="card-body">
        <table class="table table-hover mt-3">
            <thead class="table-dark">
                <tr>
                    <th>Título</th>
                    <th>Autor</th>
                    <th>Fecha</th>
                    <th class="text-center">Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for libro in libros %}
                <tr>
                    <td>{{ libro.titulo }}</td>
                    <td>{{ libro.autor }}</td>
                    <td>{{ libro.fecha_publicacion }}</td>
                    <td class="text-center">
                        <a href="{% url 'editar_libro' libro.id %}" class="btn btn-warning btn-sm">Editar</a>
                        <a href="{% url 'eliminar_libro' libro.id %}" class="btn btn-danger btn-sm">Eliminar</a>
                    </td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="4" class="text-center">No hay libros registrados aún.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
