<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Acceso Denegado - 403</title>
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="container text-center">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-danger shadow">
                    <div class="card-body py-5">
                        <h1 class="display-1 text-danger font-weight-bold">403</h1>
                        <h2 class="mb-4">Acceso No Autorizado</h2>
                        <p class="text-muted mb-4">
                            Lo sentimos, <strong>{{ user.username }}</strong>. <br>
                            Tu cuenta no tiene los permisos suficientes para ver este contenido.
                        </p>
                        <hr>
                        <div class="d-grid gap-2 d-md-block mt-4">
                            <a href="javascript:history.back()" class="btn btn-outline-secondary">Volver atrás</a>
                            <a href="{% url 'login' %}" class="btn btn-danger">Cambiar de cuenta</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
