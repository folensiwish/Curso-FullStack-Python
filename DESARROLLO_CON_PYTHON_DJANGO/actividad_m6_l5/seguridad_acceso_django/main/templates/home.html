<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Dashboard - Control de Accesos</title>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand">Panel de Control</span>
            <form action="{% url 'logout' %}" method="post" class="d-flex">
                {% csrf_token %}
                <button class="btn btn-outline-light btn-sm" type="submit">Cerrar Sesión</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <div class="alert alert-success">
            <h5>Bienvenido, <strong>{{ user.username }}</strong></h5>
        </div>

        <div class="row">
            {% if perms.main.can_edit or user.is_superuser %}
            <div class="col-md-6">
                <div class="card border-warning mb-3">
                    <div class="card-body">
                        <h5 class="card-title text-warning">Zona de Administración</h5>
        
                        <button class="btn btn-warning btn-sm">Gestionar Usuarios</button>
                    </div>
                </div>
            </div>
            {% endif %}

            <div class="col-md-6">
                <div class="card">
                    <div class="card-body">
                        <h5>Datos del Usuario</h5>
                        <ul class="list-group list-group-flush">
                            <li class="list-group-item">Email: {{ user.email|default:"No registrado" }}</li>
                            <li class="list-group-item">Último acceso: {{ user.last_login }}</li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
